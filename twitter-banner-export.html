<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .banner { width: 1500px; height: 500px; overflow: hidden; }
</style>
</head>
<body>
  <div class="banner">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
      <rect width="1500" height="500" fill="#1C3A24"/>

      <!-- Subtle molecule decorations — left -->
      <g opacity="0.15">
        <line x1="80" y1="120" x2="140" y2="80" stroke="#7AB88A" stroke-width="2" stroke-linecap="round"/>
        <line x1="140" y1="80" x2="200" y2="100" stroke="#7AB88A" stroke-width="2" stroke-linecap="round"/>
        <line x1="200" y1="100" x2="220" y2="160" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="80" y1="120" x2="60" y2="180" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="140" y1="80" x2="130" y2="40" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
        <circle cx="80" cy="120" r="8" fill="#4E8C5F"/>
        <circle cx="140" cy="80" r="10" fill="#4E8C5F"/>
        <circle cx="200" cy="100" r="7" fill="#7AB88A"/>
        <circle cx="220" cy="160" r="5" fill="#7AB88A"/>
        <circle cx="60" cy="180" r="5" fill="#C6DFC8"/>
        <circle cx="130" cy="40" r="4" fill="#C6DFC8"/>
      </g>

      <!-- Subtle molecule decorations — right -->
      <g opacity="0.15">
        <line x1="1300" y1="350" x2="1360" y2="310" stroke="#7AB88A" stroke-width="2" stroke-linecap="round"/>
        <line x1="1360" y1="310" x2="1420" y2="340" stroke="#7AB88A" stroke-width="2" stroke-linecap="round"/>
        <line x1="1420" y1="340" x2="1440" y2="400" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1300" y1="350" x2="1280" y2="410" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1360" y1="310" x2="1380" y2="260" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
        <circle cx="1300" cy="350" r="8" fill="#4E8C5F"/>
        <circle cx="1360" cy="310" r="10" fill="#4E8C5F"/>
        <circle cx="1420" cy="340" r="7" fill="#7AB88A"/>
        <circle cx="1440" cy="400" r="5" fill="#7AB88A"/>
        <circle cx="1280" cy="410" r="5" fill="#C6DFC8"/>
        <circle cx="1380" cy="260" r="4" fill="#C6DFC8"/>
      </g>

      <!-- Scattered small nodes -->
      <g opacity="0.08">
        <circle cx="350" cy="80" r="3" fill="#C6DFC8"/>
        <circle cx="420" cy="420" r="4" fill="#7AB88A"/>
        <circle cx="550" cy="60" r="2.5" fill="#C6DFC8"/>
        <circle cx="950" cy="440" r="3" fill="#C6DFC8"/>
        <circle cx="1050" cy="70" r="2.5" fill="#7AB88A"/>
        <circle cx="1150" cy="430" r="3.5" fill="#C6DFC8"/>
      </g>

      <!-- Logo molecule -->
      <g transform="translate(480, 250) scale(2.2)">
        <line x1="-2" y1="-2" x2="-24" y2="-22" stroke="#4E8C5F" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="-4" x2="22" y2="-24" stroke="#4E8C5F" stroke-width="2" stroke-linecap="round"/>
        <line x1="4" y1="0" x2="26" y2="4" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="0" y1="4" x2="-8" y2="24" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-4" y1="2" x2="-26" y2="18" stroke="#C6DFC8" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="-24" y1="-22" x2="-34" y2="-30" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
        <line x1="-24" y1="-22" x2="-22" y2="-34" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
        <line x1="22" y1="-24" x2="32" y2="-32" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
        <circle cx="-24" cy="-22" r="6" fill="#4E8C5F"/>
        <circle cx="22" cy="-24" r="5" fill="#4E8C5F"/>
        <circle cx="26" cy="4" r="4" fill="#7AB88A"/>
        <circle cx="-8" cy="24" r="4" fill="#7AB88A"/>
        <circle cx="-26" cy="18" r="3" fill="#C6DFC8"/>
        <circle cx="-34" cy="-30" r="2" fill="#C6DFC8"/>
        <circle cx="-22" cy="-34" r="2" fill="#C6DFC8"/>
        <circle cx="32" cy="-32" r="2" fill="#C6DFC8"/>
        <circle cx="0" cy="0" r="8" fill="#7AB88A"/>
        <circle cx="0" cy="0" r="4.5" fill="#C6DFC8"/>
      </g>

      <!-- Site name -->
      <text x="590" y="232" font-family="Georgia,'Times New Roman',serif" font-size="64" font-weight="400" fill="#EDE7DA" letter-spacing="-0.5">Peptide</text>
      <text x="592" y="275" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="300" fill="#7AB88A" letter-spacing="8">REVEALED</text>

      <!-- Tagline -->
      <text x="592" y="330" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="300" fill="#9FB4A1" letter-spacing="1">Evidence-based peptide research. No hype. Just science.</text>
    </svg>
  </div>
</body>
</html>
