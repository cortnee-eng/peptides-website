<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark green background circle (Twitter crops to circle) -->
  <rect width="400" height="400" rx="200" fill="#1C3A24"/>

  <!-- Molecule structure — centered and scaled up from nav logo -->
  <g transform="translate(200, 190) scale(3.2)">
    <!-- Bonds -->
    <line x1="-2" y1="-2" x2="-24" y2="-22" stroke="#4E8C5F" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="-4" x2="22" y2="-24" stroke="#4E8C5F" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="0" x2="26" y2="4" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="-8" y2="24" stroke="#7AB88A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-4" y1="2" x2="-26" y2="18" stroke="#C6DFC8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-24" y1="-22" x2="-34" y2="-30" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
    <line x1="-24" y1="-22" x2="-22" y2="-34" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>
    <line x1="22" y1="-24" x2="32" y2="-32" stroke="#C6DFC8" stroke-width="1" stroke-linecap="round"/>

    <!-- Nodes -->
    <circle cx="-24" cy="-22" r="6" fill="#4E8C5F"/>
    <circle cx="22" cy="-24" r="5" fill="#4E8C5F"/>
    <circle cx="26" cy="4" r="4" fill="#7AB88A"/>
    <circle cx="-8" cy="24" r="4" fill="#7AB88A"/>
    <circle cx="-26" cy="18" r="3" fill="#C6DFC8"/>
    <circle cx="-34" cy="-30" r="2" fill="#C6DFC8"/>
    <circle cx="-22" cy="-34" r="2" fill="#C6DFC8"/>
    <circle cx="32" cy="-32" r="2" fill="#C6DFC8"/>

    <!-- Central node -->
    <circle cx="0" cy="0" r="8" fill="#7AB88A"/>
    <circle cx="0" cy="0" r="4.5" fill="#C6DFC8"/>
  </g>

  <!-- "PR" monogram below the molecule -->
  <text x="200" y="320" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="400" fill="#C6DFC8" text-anchor="middle" letter-spacing="4">PR</text>
</svg>
